gui:
  upgradeconfirm:
    info:
      item: EXPERIENCE_BOTTLE
      name: "&b&lUpgrade Confirmation"
      lore:
        - "&7Current level: &e%realm_level%"
        - "&7Next level: &e%realm_nextlevel%"
        - ""
        - "&7Cost: &6$%realm_nextlevelcost%"
    confirm:
      item: GREEN_TERRACOTTA
      name: "&aConfirm Upgrade"
      lore:
        - "&7Click to confirm upgrading"
        - "&7your Realm to level &e%realm_nextlevel%"
    cancel:
      item: RED_TERRACOTTA
      name: "&cCancel"
      lore:
        - "&7Go back to Realm options."
  realmgui:
    home:
      item: DARK_OAK_DOOR
      data: 0
      name: "&bTeleport to Realm"
      slot: 36
      lore:
        - ""
        - "&7Teleport to %realm_name%'s Realm."
      clickmessage: "&aTeleporting to the realm..."
    privacy:
      item: LIME_DYE
      data: 0
      name: "&bToggle Privacy: &3%realm_privacy%"
      slot: 37
      lore:
        - "&7Toggle Realm's privacy"
        - ""
        - "&aPublic &8- &7Anyone can visit your Realm."
        - "&cPrivate &8- &7No one can visit your Realm."
      clickmessage: "&aRealm visibility successfully changed to &b%realm_privacy%"
    banned:
      item: BARRIER
      data: 0
      name: "&bBanned Players"
      slot: 41
      lore:
        - ""
        - "&7View and manage players that have been banned from this Realm."
    members:
      item: PLAYER_HEAD
      data: 3
      name: "&bMembers"
      slot: 40
      lore:
        - ""
        - "&7View and manage the members of this realm."
    theme:
      item: PAINTING
      data: 0
      name: "&bSpawn Themes"
      slot: 39
      lore:
        - ""
        - "&7Customize your Realms spawn point with different themes."
    upgrade:
      item: DIRT
      data: 0
      name: "&bUpgrade Build Size"
      slot: 38
      lore:
        - "&7Click to upgrade Realm's build size."
        - ""
        - "&eCurrent Realm:"
        - "&7Size: &e%realm_bordersize%&8x&e%realm_bordersize%"
        - "&7Max # of Members: &e%realm_maxplayer%"
        - ""
        - "&aNext level:"
        - "&7Size: &e%realm_nextbordersize%&8x&e%realm_nextbordersize%"
        - "&7Max # of Members: &e%realm_nextmaxplayer%"
        - "&7Cost: &6$%realm_nextlevelcost%"
      maxlevellore:
        - "&7Click to upgrade Realm's build size."
        - ""
        - "&eCurrent Realm:"
        - "&7Size: &e%realm_bordersize%&8x&e%realm_bordersize%"
        - "&7Max # of Members: &e%realm_maxplayer%"
        - ""
        - "&aMax level"
  membersgui:
    player:
      name: "&b%player_name%"
      lore:
        - "&7Rank: &e%player_rank%"
        - ""
        - "&eClick to edit %player_name%'s permissions."
  back:
    item: RED_BED
    data: 0
    name: "⬅ &bGo back"
    slot: 44
    lore:
        - ""
        - "&7Click to go back to the"
        - "&7Realm options."
  default:
    item: BLACK_STAINED_GLASS_PANE
    data: 15
