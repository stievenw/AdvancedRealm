themes:
  basic:
    path: basictheme.schematic
    blocks_infrontof_spawn: 8
    permission: realm.theme.other
    item:
      name: '&eBasic Theme'
      material: GRASS
      durability: 1
      lore:
        - '§7The theme of the basic island'
config:
  #The space beetween each realm
  spacing: 500
  #Realm type: ISLAND (void world, schematic pasted, spawn area protected) or WORLD (normal terrain, full owner control)
  realm-type: ISLAND
  #Default biome used for the realm world (only applies when realm-type is WORLD)
  world-biome: PLAINS
  #Available biomes for players to choose when claiming a WORLD realm (each biome gets its own world)
  biomes:
    - PLAINS
    - DESERT
    - FOREST
    - TAIGA
    - SWAMP
    - JUNGLE
    - BADLANDS
    - SAVANNA
    - SNOWY_PLAINS
    - BIRCH_FOREST
    - DARK_FOREST
    - FLOWER_FOREST
    - MEADOW
    - CHERRY_GROVE
  #The world where realms will be created
  world: AdvancedRealmWorld
  spawn:
    world: world
    x: -1
    y: 66
    z: -1
    yaw: 0
    pitch: 0

vote:
  #Cooldown is handled like that "days/hours/minutes/seconds"
  cooldown: "0d/7h/0m/0s"
  #people can vote multiple times for the same realm
  multiplevote: false
  #people can vote for their own realm
  ownedvote: false
